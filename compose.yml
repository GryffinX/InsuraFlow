services:
  db:
    image: postgres:16-alpine
    container_name: insuraflow_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-insuraflow_db}
      POSTGRES_USER: ${DB_USER:-insuraflow_user}
      POSTGRES_PASSWORD: ${DB_PASS:-insuraflow_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: insuraflow_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./server
    container_name: insuraflow_backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-insuraflow_db}
      - DB_USER=${DB_USER:-insuraflow_user}
      - DB_PASS=${DB_PASS:-insuraflow_pass}
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - DEBUG=True
      - ALLOWED_HOSTS=127.0.0.1,localhost
      - SECRET_KEY=${SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      - db
      - redis

  frontend:
    build: ./client
    container_name: insuraflow_frontend
    ports:
      - "5173:3000"
    environment:
      - PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
